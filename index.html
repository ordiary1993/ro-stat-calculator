<body>
    <div class="container">
        <h1>Ragnarok Online Stat Calculator</h1>

        <!-- Calculator UI -->
        <div class="stat-grid">
            <div class="stat-input">
                <label>STR</label>
                <input type="number" id="str" min="1" max="99" placeholder="Empty for Auto" autocomplete="off">
            </div>
            <div class="stat-input">
                <label>AGI</label>
                <input type="number" id="agi" min="1" max="99" placeholder="Empty for Auto" autocomplete="off">
            </div>
            <div class="stat-input">
                <label>VIT</label>
                <input type="number" id="vit" min="1" max="99" placeholder="Empty for Auto" autocomplete="off">
            </div>
            <div class="stat-input">
                <label>INT</label>
                <input type="number" id="int" min="1" max="99" placeholder="Empty for Auto" autocomplete="off">
            </div>
            <div class="stat-input">
                <label>DEX</label>
                <input type="number" id="dex" min="1" max="99" placeholder="Empty for Auto" autocomplete="off">
            </div>
            <div class="stat-input">
                <label>LUK</label>
                <input type="number" id="luk" min="1" max="99" placeholder="Empty for Auto" autocomplete="off">
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Status Point</label>
                <select id="totalPoints">
                    <option value="1273" selected>Level 99 (1273 Status Point) Classic</option>
                    <option value="1325">Level 99 (1325 Status Point) Transcendent</option>
                </select>
            </div>
            <button id="generateBtn">Generate</button>
        </div>

        <!-- Results Section -->
        <div id="results">
            <div class="summary" id="summary"></div>
            <div id="errorMsg" class="error"></div>
            <div id="combinations" class="stats-grid"></div>

    <script>
    (function() {
        // Cost table (stat → cost from 1)
        const costMap = new Map();
        
        // Build cost map programmatically
        function buildCostMap() {
            let cost = 0;
            for (let stat = 1; stat <= 99; stat++) {
                if (stat > 1) {
                    let increment;
                    if (stat <= 11) increment = 2;
                    else if (stat <= 21) increment = 3;
                    else if (stat <= 31) increment = 4;
                    else if (stat <= 41) increment = 5;
                    else if (stat <= 51) increment = 6;
                    else if (stat <= 61) increment = 7;
                    else if (stat <= 71) increment = 8;
                    else if (stat <= 81) increment = 9;
                    else if (stat <= 91) increment = 10;
                    else increment = 11;
                    cost += increment;
                }
                costMap.set(stat, cost);
            }
        }
        buildCostMap();

        // Reverse mapping: cost → stat
        const reverseCost = new Map();
        for (let [stat, c] of costMap) {
            reverseCost.set(c, stat);
        }
        const validCosts = Array.from(reverseCost.keys()).sort((a,b)=>a-b);

        // Stat names
        const statNames = ['STR', 'AGI', 'VIT', 'INT', 'DEX', 'LUK'];

        // Generate all valid combinations
        function generateCombinations(fixedStats, totalPoints) {
            const fixedIndices = [];
            const fixedCosts = [];
            let fixedTotalCost = 0;

            for (let i = 0; i < 6; i++) {
                if (fixedStats[i] !== null) {
                    const stat = fixedStats[i];
                    if (!costMap.has(stat)) {
                        throw new Error(`Invalid value at ${statNames[i]}: ${stat} (must be 1-99)`);
                    }
                    const cost = costMap.get(stat);
                    fixedIndices.push(i);
                    fixedCosts.push({ index: i, stat: stat, cost: cost });
                    fixedTotalCost += cost;
                }
            }

            const fixedCount = fixedIndices.length;
            const flexCount = 6 - fixedCount;
            let remaining = totalPoints - fixedTotalCost;
            if (remaining < 0) throw new Error("Total points too low for fixed stats");

            if (flexCount === 0) {
                if (remaining === 0) {
                    const result = new Array(6);
                    fixedCosts.forEach(f => { result[f.index] = f.stat; });
                    return [result];
                } else {
                    return [];
                }
            }

            const flexCostCombos = [];

            function findCombos(startIdx, currentCombo, currentSum, depth, maxDepth) {
                if (depth === maxDepth) {
                    if (currentSum === remaining) {
                        flexCostCombos.push([...currentCombo]);
                    }
                    return;
                }
                
                const minPossible = validCosts[startIdx] * (maxDepth - depth);
                const maxPossible = validCosts[validCosts.length-1] * (maxDepth - depth);
                if (currentSum + minPossible > remaining) return;
                if (currentSum + maxPossible < remaining) return;

                for (let i = startIdx; i < validCosts.length; i++) {
                    const cost = validCosts[i];
                    if (currentSum + cost > remaining) break;
                    currentCombo.push(cost);
                    findCombos(i, currentCombo, currentSum + cost, depth + 1, maxDepth);
                    currentCombo.pop();
                }
            }

            findCombos(0, [], 0, 0, flexCount);

            const results = [];

            for (let costCombo of flexCostCombos) {
                const flexStats = costCombo.map(c => reverseCost.get(c));
                const sortedFlexStats = [...flexStats].sort((a,b)=>a-b);
                
                const result = new Array(6);
                fixedCosts.forEach(f => { result[f.index] = f.stat; });
                
                const flexibleIndices = [];
                for (let i = 0; i < 6; i++) {
                    if (fixedStats[i] === null) flexibleIndices.push(i);
                }
                
                for (let j = 0; j < sortedFlexStats.length; j++) {
                    result[flexibleIndices[j]] = sortedFlexStats[j];
                }
                
                results.push(result);
            }

            const unique = new Set();
            const final = [];
            for (let combo of results) {
                const key = combo.join(',');
                if (!unique.has(key)) {
                    unique.add(key);
                    final.push(combo);
                }
            }
            return final;
        }

        function displayResults(combos) {
            const container = document.getElementById('combinations');
            const summary = document.getElementById('summary');
            const errorMsg = document.getElementById('errorMsg');
            container.innerHTML = '';
            errorMsg.innerText = '';

            if (combos.length === 0) {
                summary.innerText = 'No valid combinations found.';
                return;
            }

            summary.innerText = `Found ${combos.length} combination${combos.length>1?'s':''}:`;

            combos.forEach(combo => {
                const div = document.createElement('div');
                div.className = 'stat-item';
                const display = statNames.map((name, idx) => `${name} ${combo[idx]}`).join(' · ');
                div.innerText = display;
                container.appendChild(div);
            });
        }

        document.getElementById('generateBtn').addEventListener('click', () => {
            const str = document.getElementById('str').value;
            const agi = document.getElementById('agi').value;
            const vit = document.getElementById('vit').value;
            const int = document.getElementById('int').value;
            const dex = document.getElementById('dex').value;
            const luk = document.getElementById('luk').value;

            const fixedStats = [
                str === '' ? null : parseInt(str, 10),
                agi === '' ? null : parseInt(agi, 10),
                vit === '' ? null : parseInt(vit, 10),
                int === '' ? null : parseInt(int, 10),
                dex === '' ? null : parseInt(dex, 10),
                luk === '' ? null : parseInt(luk, 10)
            ];

            for (let i = 0; i < 6; i++) {
                if (fixedStats[i] !== null && (fixedStats[i] < 1 || fixedStats[i] > 99)) {
                    document.getElementById('errorMsg').innerText = `${statNames[i]} must be between 1 and 99.`;
                    return;
                }
            }

            const totalPoints = parseInt(document.getElementById('totalPoints').value, 10);
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.innerText = '';

            try {
                const combos = generateCombinations(fixedStats, totalPoints);
                displayResults(combos);
            } catch (e) {
                errorMsg.innerText = e.message;
            }
        });

        // Clear inputs on page load
        window.onload = function() {
            document.getElementById('str').value = '';
            document.getElementById('agi').value = '';
            document.getElementById('vit').value = '';
            document.getElementById('int').value = '';
            document.getElementById('dex').value = '';
            document.getElementById('luk').value = '';
        };

        // Initialize ads (required by AdMob)
        (adsbygoogle = window.adsbygoogle || []).push({});
    })();
    </script>
